version: "3.9"

services:
  db:
    image: postgres:15
    container_name: profdnk_db
    environment:
      POSTGRES_DB: profdnk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: profdnk_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/profdnk
      SECRET_KEY: super-secret-key-123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      ADMIN_EMAIL: admin@profdnk.ru
      ADMIN_PASSWORD: admin123
      FRONTEND_URL: http://ТУТ_ТВОЙ_IP  # <-- поменяй
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: profdnk_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: